# Parametros de granprix_bot -- pista del examen (pistas/pista_ejemplo.txt,
# 12x8 celdas de 30x30 cm, inicio A1, meta L8).
#
# Calibracion tomada de AVANCE_Y_GIRO_CALIBRADO.md (avance/giro por
# odometria) y CALIBRACION_LIDAR_VISION.md (zonas de LiDAR), ambos en
# la raiz de simulador_pista. Editar SIEMPRE en el PC, nunca en el
# robot (ver FLUJO_DE_TRABAJO.md).
#
# explorer y speedrun comparten casi todos los parametros (ver
# granprix_bot/robot_state.py::PARAMETROS_DEFAULT) -- se repiten aca
# por nodo porque asi es como ROS2 carga params por namespace, pero
# deben mantenerse iguales entre ambos salvo que se recalibren.

explorer:
  ros__parameters:
    scan_topic: /scan
    odom_topic: /odom_raw
    cmd_vel_topic: /cmd_vel
    # Buzzer del robot -- confirmado en el proyecto original con
    # `ros2 topic info /beep -v` (lo suscribe el driver YB_Car_Node).
    buzzer_topic: /beep
    # Pitido suave al decidir un giro (ver motion.py::_emitir_pitido),
    # publicado justo antes de PAUSA_GIRO -- avisa que el proximo
    # movimiento es un giro, no un avance recto.
    pitido_giro_ms: 120
    # Telemetria (ver motion.py::_log_evento / _set_state, y
    # README.md seccion 4.1): topico de eventos de decision y de
    # estado actual, para ver en vivo con `ros2 topic echo`.
    event_topic: /robot_event
    robot_state_topic: /robot_state
    control_rate_hz: 20.0

    # --- Pista (pistas/pista_ejemplo.txt) ---
    # Reducido de 30 a 25 (pedido explicito): el robot recorria mas de
    # lo comandado por inercia/frenado real, asi que se acorta la
    # distancia de avance por celda para compensar. La pista fisica
    # (pistas/pista_ejemplo.txt) sigue siendo de celdas de 30cm --
    # este valor es SOLO la distancia que se le pide recorrer a cada
    # AVANZAR, no una medida de la pista.
    celda_cm: 25.0
    num_columnas: 12
    num_filas: 8
    celda_inicio: A1
    celda_meta: L8
    heading_inicial: "N"
    # "N" SIN COMILLAS se interpreta como booleano false en YAML 1.1
    # (el "problema de Noruega": y/Y/yes/n/N/no/on/off... son
    # palabras reservadas de booleano) -- eso mezclaba tipos en esta
    # lista (bool + string) y tumbaba rclpy.init() al parsear el
    # archivo entero ("Sequence should be of same type"). SIEMPRE
    # entre comillas.
    orden_desempate: ["N", "E", "S", "O"]
    max_celdas_recorridas: 200

    # --- LiDAR (CALIBRACION_LIDAR_VISION.md, seccion 1) ---
    front_offset_deg: 180.0
    # Cambiado de true a false: en pista real, A1 sensaba pared al E
    # (right) cuando en pista_ejemplo.txt esta abierto hasta F1, y A8
    # sensaba sin pared al O (left) cuando ahi hay borde de tablero --
    # las zonas izquierda/derecha del LiDAR estaban intercambiadas para
    # el montaje real (front/back si eran correctos).
    invert_left_right: false
    front_window_deg: [-5.0, 5.0]
    right_window_deg: [-110.0, -70.0]
    left_window_deg: [70.0, 110.0]
    back_window_deg: [165.0, 195.0]
    max_range_use_m: 4.0
    # Umbral de "hay pared" al sensar una celda: celda_cm/2 (15cm) +
    # margen de seguridad (5cm) = 20cm. Si el LiDAR mide menos que
    # esto en una zona, se marca pared en esa direccion.
    umbral_pared_m: 0.20
    # Validacion por consenso (ver motion.py::_tick_validacion_muros):
    # una sola lectura de LiDAR puede fallar por ruido o desalineacion;
    # se toman sensado_muestras lecturas seguidas y una zona solo se
    # confirma como pared si aparecio en al menos
    # sensado_consenso_minimo de ellas.
    sensado_muestras: 5
    sensado_consenso_minimo: 3

    # --- Avance y giro calibrados (AVANCE_Y_GIRO_CALIBRADO.md) ---
    factor_dist_odom: 0.9474
    factor_ang_odom: 0.9899
    velocidad_recta_mps: 0.15
    margen_avance_m: 0.03
    # Correccion continua durante el avance recto (motion.py::_correccion_recta):
    # corrige error angular + deriva lateral respecto a la linea recta
    # inicial. 'ninguna' vuelve al avance ciego original.
    tipo_correccion: angular_simple
    kp_angulo_recto: 2.2
    kp_lateral_recto: 1.1
    angular_max_correccion_radps: 0.3
    velocidad_giro_lineal_mps: 0.06
    velocidad_giro_angular_radps: 0.6
    angulo_giro_deg: 90.0
    # Margen de seguridad SOBRE el objetivo de cada giro (no un angulo
    # absoluto): 90+60=150 para giros de 90, 180+60=240 para ATRAS.
    # Antes era un valor absoluto (150) menor que el objetivo real de
    # un giro ATRAS (180), asi que todo giro de 180 se cortaba en
    # ~150 grados reales -- ver motion.py::_tick_giro.
    margen_seguridad_giro_deg: 60.0
    # El giro ahora corta contra un yaw ABSOLUTO fijo desde el inicio
    # de la mision (motion.py::_yaw_objetivo), no contra un delta
    # relativo al yaw de arranque de ESE giro -- asi el error de un
    # giro no se acumula en el siguiente. tolerancia_giro_absoluto_deg
    # es que tan cerca del objetivo absoluto hay que estar para dar el
    # giro por terminado.
    tolerancia_giro_absoluto_deg: 3.0
    # Piso de seguridad: cuanto tiene que haber girado REALMENTE antes
    # de aceptar "ya estoy cerca del objetivo absoluto" -- sin esto, si
    # ya habia error acumulado que por casualidad dejaba el yaw cerca
    # del destino, el giro podria cortarse casi sin haber girado.
    margen_giro_minimo_deg: 4.0
    # Reusado tambien como pausa de 1s al llegar a cada celda (sensado).
    tiempo_pausa_antes_girar_s: 1.0

    # --- Seguridad ---
    umbral_colision_m: 0.10
    tiempo_espera_obstaculo_s: 2.0
    # Si el obstaculo sigue bloqueando despues de esta cantidad de
    # ciclos de espera, se aborta la mision en vez de esperar para
    # siempre en silencio.
    max_intentos_obstaculo: 5

    # --- Salida: mapa descubierto, lo consume speedrun despues ---
    mapa_salida: "~/capytown_resultados/mapa_descubierto.yaml"

speedrun:
  ros__parameters:
    scan_topic: /scan
    odom_topic: /odom_raw
    cmd_vel_topic: /cmd_vel
    buzzer_topic: /beep
    pitido_giro_ms: 120
    event_topic: /robot_event
    robot_state_topic: /robot_state
    control_rate_hz: 20.0

    # Reducido de 30 a 25 (pedido explicito): el robot recorria mas de
    # lo comandado por inercia/frenado real, asi que se acorta la
    # distancia de avance por celda para compensar. La pista fisica
    # (pistas/pista_ejemplo.txt) sigue siendo de celdas de 30cm --
    # este valor es SOLO la distancia que se le pide recorrer a cada
    # AVANZAR, no una medida de la pista.
    celda_cm: 25.0
    num_columnas: 12
    num_filas: 8
    celda_inicio: A1
    celda_meta: L8
    heading_inicial: "N"
    # "N" SIN COMILLAS se interpreta como booleano false en YAML 1.1
    # (el "problema de Noruega": y/Y/yes/n/N/no/on/off... son
    # palabras reservadas de booleano) -- eso mezclaba tipos en esta
    # lista (bool + string) y tumbaba rclpy.init() al parsear el
    # archivo entero ("Sequence should be of same type"). SIEMPRE
    # entre comillas.
    orden_desempate: ["N", "E", "S", "O"]
    max_celdas_recorridas: 200

    front_offset_deg: 180.0
    invert_left_right: false
    front_window_deg: [-5.0, 5.0]
    right_window_deg: [-110.0, -70.0]
    left_window_deg: [70.0, 110.0]
    back_window_deg: [165.0, 195.0]
    max_range_use_m: 4.0
    umbral_pared_m: 0.20
    sensado_muestras: 5
    sensado_consenso_minimo: 3

    factor_dist_odom: 0.9474
    factor_ang_odom: 0.9899
    # Velocidad recta del tramo comprimido -- puede subirse una vez
    # validado en pista (a diferencia de explorer, aca no hay pausas
    # intermedias que absorban un error de deriva).
    velocidad_recta_mps: 0.15
    margen_avance_m: 0.03
    tipo_correccion: angular_simple
    kp_angulo_recto: 2.2
    kp_lateral_recto: 1.1
    angular_max_correccion_radps: 0.3
    velocidad_giro_lineal_mps: 0.06
    velocidad_giro_angular_radps: 0.6
    angulo_giro_deg: 90.0
    margen_seguridad_giro_deg: 60.0
    tolerancia_giro_absoluto_deg: 3.0
    margen_giro_minimo_deg: 4.0
    tiempo_pausa_antes_girar_s: 1.0

    umbral_colision_m: 0.10
    tiempo_espera_obstaculo_s: 2.0
    max_intentos_obstaculo: 5

    # --- Entrada: mapa que dejo explorer ---
    mapa_entrada: "~/capytown_resultados/mapa_descubierto.yaml"

# Dashboard web -- ver robot/README.md seccion 7 y web/index.html.
# Nodo aparte, self-contained (no comparte parametros con explorer/
# speedrun): solo escucha topicos, no mueve al robot.
web_dashboard:
  ros__parameters:
    puerto: 8080
    scan_topic: /scan
    odom_topic: /odom_raw
    cmd_vel_topic: /cmd_vel
    event_topic: /robot_event
    robot_state_topic: /robot_state
    front_offset_deg: 180.0
    invert_left_right: false
    max_range_use_m: 4.0
    factor_dist_odom: 0.9474
    factor_ang_odom: 0.9899
    celda_inicio: A1
    heading_inicial: "N"
    # mapa_referencia se pasa desde el launch file (default: el JSON
    # instalado en config/pista_ejemplo_referencia.json).
